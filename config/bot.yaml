sizing:
  margin_usd: 66
  leverage: 10

offsets:
  entry_offset_bps: 5
  # 100 bps = 1% target profit per TP lot.
  tp_offset_bps: 100

merge_timer:
  seconds: 1800
  policy: first_fill

fees:
  maker_bps: -1.0
  taker_bps: 5.5

risk:
  max_notional_per_symbol_usd: 10000
  max_notional_account_usd: 50000
  max_consecutive_losses: 5
  cooldown_minutes: 60
  daily_loss_limit_usd: 5000

account:
  initial_equity: 30000
  margin_mode: cross

liquidation:
  enabled: true
  maintenance_margin_rate: 0.005
  near_liq_buffer_pct: 10
  funding_stress_bps: 0

optimizer:
  safety_gates:
    reject_liquidated: true
    reject_near_liquidation: true
    max_drawdown_pct: 25
    max_final_open_exposure_usd: 5000

regime_router:
  enabled: false
  no_trade_on_unsafe: true

signal:
  engine: trend_filter
  params:
    inner: grid
    inner_anchor_period: 200
    inner_entry_bps: 30
    inner_step_bps: 15
    max_trend_bps: 30

loop:
  reconcile_every_seconds: 30
